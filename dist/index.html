<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🦠 Zombie Outbreak Simulator</title>
  <script type="module" crossorigin src="/assets/index-CFeGWa_5.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-pps6idBN.css">
</head>
<body>
  <div id="app">
    <div id="three-container"></div>
    <div id="ui-overlay">
      <div id="hud">
        <div class="hud-title">🧟 ZOMBIE OUTBREAK</div>
        <div class="hud-stats">
          <div class="stat-box">
            <span class="stat-label">DAY</span>
            <span id="stat-day" class="stat-value">1</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">TIME</span>
            <span id="stat-time" class="stat-value">06:00</span>
          </div>
          <div class="stat-box civilian-stat">
            <span class="stat-label">👤 CIVILIANS</span>
            <span id="stat-civilians" class="stat-value">0</span>
          </div>
          <div class="stat-box zombie-stat">
            <span class="stat-label">🧟 ZOMBIES</span>
            <span id="stat-zombies" class="stat-value">0</span>
          </div>
          <div class="stat-box military-stat">
            <span class="stat-label">🔫 MILITARY</span>
            <span id="stat-military" class="stat-value">0</span>
          </div>
          <div class="stat-box total-stat">
            <span class="stat-label">💀 DEAD</span>
            <span id="stat-dead" class="stat-value">0</span>
          </div>
          <div class="stat-box food-stat">
            <span class="stat-label">🍖 FOOD</span>
            <span id="stat-food" class="stat-value">100%</span>
          </div>
        </div>
        <div class="speed-control">
          <span class="speed-label">⏱ SPEED</span>
          <input type="range" id="speed-slider" min="0.5" max="100" step="0.5" value="1" />
          <span id="speed-display" class="speed-value">1x</span>
        </div>
        <div class="controls-row">
          <button id="btn-pause" class="ctrl-btn">⏸ Pause</button>
          <button id="btn-reset" class="ctrl-btn">🔄 Reset</button>
          <button id="btn-camera" class="ctrl-btn">🎥 Orbit</button>
        </div>
        <div id="event-feed" class="event-feed">
          <div class="event-feed-title">📡 Event Log</div>
          <div id="event-list"></div>
        </div>
      </div>
      <div id="chart-container">
        <canvas id="pop-chart" width="400" height="140"></canvas>
      </div>
    </div>
  </div>
</body>
</html>
